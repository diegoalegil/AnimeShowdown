name: tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Cancela ejecuciones previas si llega un push nuevo a la misma rama/PR.
# Ahorra minutos de Actions sin afectar a runs de otras ramas.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (Java 21 + Maven)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Guardrail Flyway migrations are immutable
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [ -z "$BASE_SHA" ] || [[ "$BASE_SHA" =~ ^0+$ ]]; then
            echo "No base SHA available; skipping Flyway guardrail."
            exit 0
          fi
          ../scripts/check-flyway-migrations.sh "$BASE_SHA"

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify Maven Wrapper executable
        run: chmod +x mvnw

      # -B = batch mode (sin colores ASCII en log)
      # --no-transfer-progress = sin spam de descarga de deps
      - name: Run tests
        run: ./mvnw -B --no-transfer-progress test

      # Sube los reports incluso si los tests fallaron, así se puede
      # inspeccionar surefire-reports desde la UI de GitHub Actions.
      - name: Upload surefire reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/target/surefire-reports
          retention-days: 7

  frontend:
    name: frontend (Node 22 + Vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 22 LTS
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      # Lint primero — si hay errores de ESLint que es rápido fallar aquí
      # antes que pasar 30s en vite build.
      - name: Lint
        run: npm run lint

      # build:no-images salta el procesamiento de 700+ imágenes con sharp
      # (que tardaba 5-7min en CI cold). El CI solo VERIFICA que el bundle
      # compila — no despliega nada.
      #
      # MISMO comando que usa Cloudflare Pages en producción desde
      # 2026-05-17: las variantes responsive -300.webp/-600.webp se
      # commitean al repo y CF las sirve directamente sin regenerarlas.
      # Antes la docu mencionaba que CF corría `npm run build` completo,
      # que disparaba el timeout de 20 min del free tier.
      #
      # Audit externo AS-001/AS-006 (2026-05-22): VITE_API_URL es obligatoria
      # en builds de prod — api.js lanza Error si falta. Antes el CI compilaba
      # OK sin la env (porque vite no la valida en build, solo en runtime),
      # así que un PR podía mergearse y luego romper producción en blanco.
      # Pasamos un valor placeholder de prod (animeshowdown.dev) para que el
      # check guard de api.js se valide en el módulo durante el build chunk.
      - name: Build (sin regenerar variantes de imagen)
        env:
          VITE_API_URL: https://api.animeshowdown.dev
        run: npm run build:no-images

      # Plan v2 §3.10: bundle size budget. Falla la CI si el chunk
      # principal (index-*.js) supera 250KB tras gzip. Catch temprano
      # de regresiones por imports gordos olvidados. Personaje3D y
      # otros chunks lazy no entran en el budget — solo el initial.
      - name: Bundle size budget
        run: npm run test:bundle

      # Audit externo AS-001/AS-006 (2026-05-22): verifica que la API base
      # quedó bundleada. api.js inicializa API_BASE en módulo global con
      # `import.meta.env.VITE_API_URL`, y vite la inlinea durante el build.
      # Si el workflow olvida pasar la env, el valor inlineado es undefined
      # y el throw del fail-fast se dispara en runtime (pantalla blanca).
      # API_BASE vive en el chunk app-runtime-*.js (separado del index
      # para evitar invalidar el bundle principal al cambiar API URL).
      #
      # El workflow e2e.yml valida el runtime real con Playwright + backend
      # local. Este check es una segunda red rápida para el job `tests`.
      - name: Smoke producción (bundle contiene API_BASE)
        run: |
          BUNDLE=$(ls dist/assets/app-runtime-*.js 2>/dev/null | head -1)
          if [ -z "$BUNDLE" ]; then
            echo "::error::No se encontró bundle app-runtime-*.js"
            ls dist/assets/ | head -20
            exit 1
          fi
          if ! grep -q "api.animeshowdown.dev" "$BUNDLE"; then
            echo "::error::Bundle no contiene la API base esperada — VITE_API_URL no se aplicó al build."
            exit 1
          fi
          echo "OK: bundle contiene API base bundleada en $BUNDLE."

  sync-personajes-check:
    name: sync-personajes (--check drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 22 LTS
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      # Audit P2 (2026-05-17): antes corríamos --dry-run, que no fallaba
      # aunque hubiera carpetas enteras de personajes en img/ sin entrar al
      # seed/personajes.js. Resultado: pushes que añadían imágenes pero
      # NO llegaban al frontend ni a la BBDD hasta que alguien recordara
      # correr sync. --check compara seed.json vs escaneo de img/ (con la
      # WIP allowlist aplicada) y falla con exit 1 listando el drift, con
      # mensaje accionable. También valida que los JSON parsean OK.
      - name: Check sync-personajes drift
        run: node scripts/sync-personajes.mjs --check
