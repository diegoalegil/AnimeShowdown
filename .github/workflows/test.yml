name: tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Cancela ejecuciones previas si llega un push nuevo a la misma rama/PR.
# Ahorra minutos de Actions sin afectar a runs de otras ramas.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (Java 21 + Maven)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Guardrail Flyway migrations are immutable
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [ -z "$BASE_SHA" ] || [[ "$BASE_SHA" =~ ^0+$ ]]; then
            echo "No base SHA available; skipping Flyway guardrail."
            exit 0
          fi
          ../scripts/check-flyway-migrations.sh "$BASE_SHA"

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify Maven Wrapper executable
        run: chmod +x mvnw

      # -B = batch mode (sin colores ASCII en log)
      # --no-transfer-progress = sin spam de descarga de deps
      - name: Run tests
        run: ./mvnw -B --no-transfer-progress test

      # Sube los reports incluso si los tests fallaron, así se puede
      # inspeccionar surefire-reports desde la UI de GitHub Actions.
      - name: Upload surefire reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports
          path: backend/target/surefire-reports
          retention-days: 7

  frontend:
    name: frontend (Node 22 + Vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 22 LTS
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      # Lint primero — si hay errores de ESLint que es rápido fallar aquí
      # antes que pasar 30s en vite build.
      - name: Lint
        run: npm run lint

      # Typecheck (tsc --noEmit). La migración a TS es parcial, pero los
      # módulos .ts/.tsx ya existentes (api, types, queries...) tienen que
      # compilar. Antes esto solo se corría en local; un type error podía
      # llegar a main sin que el CI lo bloqueara.
      - name: Typecheck
        run: npm run typecheck

      # Vitest unit tests + coverage. Sprint Auto 06 introduce el target
      # 70% lines / 60% branches sobre src/lib/*. Los thresholds van
      # escalonados por PR (06.1 entra con umbral mínimo 5% como
      # smoke). Cada PR posterior sube el umbral en vitest.config.js
      # antes de mergear.
      #
      # --run fuerza modo no-watch (Vitest defaults a watch en TTY).
      - name: Unit tests + coverage
        run: npm run test:coverage -- --run

      # Sube el reporte de cobertura como artifact para inspección
      # post-run desde la UI de GitHub Actions. lcov.info también queda
      # disponible si más adelante se conecta Codecov / Coveralls.
      - name: Upload coverage report
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage
          retention-days: 7

      # build:no-images no copia /img/ al artefacto: exige CDN externo y
      # mantiene Cloudflare Pages ligero. El CI solo VERIFICA que el bundle
      # compila — no despliega nada.
      #
      # MISMO comando que usa Cloudflare Pages en producción desde
      # 2026-05-24: /img/* se sirve desde assets.animeshowdown.dev mediante
      # redirect generado en dist/_redirects.
      # Antes la docu mencionaba que CF corría `npm run build` completo,
      # que disparaba el timeout de 20 min del free tier.
      #
      # Pasamos VITE_API_BASE_URL y el alias legacy VITE_API_URL mientras main
      # termina la migración del cliente. El valor público de prod valida que
      # el bundle no quede apuntando a un origen vacío.
      - name: Build (sin regenerar variantes de imagen)
        env:
          VITE_API_BASE_URL: https://api.animeshowdown.dev
          VITE_API_URL: https://api.animeshowdown.dev
          ANIMESHOWDOWN_IMG_CDN_BASE_URL: https://assets.animeshowdown.dev/img
        run: npm run build:no-images

      # Presupuesto de bundle: falla si el JS inicial agregado supera 220KB
      # gzip. Personaje3D y otros chunks lazy no entran en este budget.
      - name: Bundle size budget
        env:
          REQUIRE_EXTERNAL_IMAGE_CDN: "true"
          ANIMESHOWDOWN_IMG_CDN_BASE_URL: https://assets.animeshowdown.dev/img
        run: npm run test:bundle

      # Verifica que la API base quedó bundleada. api.js inicializa API_BASE
      # en módulo global con `import.meta.env.VITE_API_BASE_URL`, y vite la inlinea durante el build.
      # Si el workflow olvida pasar la env, el valor inlineado es undefined
      # y el throw del fail-fast se dispara en runtime (pantalla blanca).
      # API_BASE vive en el chunk app-runtime-*.js (separado del index
      # para evitar invalidar el bundle principal al cambiar API URL).
      #
      # El workflow e2e.yml valida el runtime real con Playwright + backend
      # local. Este check es una segunda red rápida para el job `tests`.
      - name: Smoke producción (bundle contiene API_BASE)
        run: |
          BUNDLE=$(ls dist/assets/app-runtime-*.js 2>/dev/null | head -1)
          if [ -z "$BUNDLE" ]; then
            echo "::error::No se encontró bundle app-runtime-*.js"
            ls dist/assets/ | head -20
            exit 1
          fi
          if ! grep -q "api.animeshowdown.dev" "$BUNDLE"; then
            echo "::error::Bundle no contiene la API base esperada — VITE_API_URL no se aplicó al build."
            exit 1
          fi
          echo "OK: bundle contiene API base bundleada en $BUNDLE."

  sync-personajes-check:
    name: sync-personajes (--check drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 22 LTS
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      # --check compara seed.json vs escaneo de img/ y falla con exit 1
      # listando el drift. También valida que los JSON parsean OK.
      - name: Check sync-personajes drift
        run: node scripts/sync-personajes.mjs --check
