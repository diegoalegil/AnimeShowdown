name: tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Cancela ejecuciones previas si llega un push nuevo a la misma rama/PR.
# Ahorra minutos de Actions sin afectar a runs de otras ramas.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (Java 21 + Maven)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify Maven Wrapper executable
        run: chmod +x mvnw

      # -B = batch mode (sin colores ASCII en log)
      # --no-transfer-progress = sin spam de descarga de deps
      - name: Run tests
        run: ./mvnw -B --no-transfer-progress test

      # Sube los reports incluso si los tests fallaron, así se puede
      # inspeccionar surefire-reports desde la UI de GitHub Actions.
      - name: Upload surefire reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/target/surefire-reports
          retention-days: 7

  frontend:
    name: frontend (Node 22 + Vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22 LTS
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      # Lint primero — si hay errores de ESLint que es rápido fallar aquí
      # antes que pasar 30s en vite build.
      - name: Lint
        run: npm run lint

      # build:no-images salta el procesamiento de 700+ imágenes con sharp
      # (que tardaba 5-7min en CI cold). El CI solo VERIFICA que el bundle
      # compila — no despliega nada.
      #
      # MISMO comando que usa Cloudflare Pages en producción desde
      # 2026-05-17: las variantes responsive -300.webp/-600.webp se
      # commitean al repo y CF las sirve directamente sin regenerarlas.
      # Antes la docu mencionaba que CF corría `npm run build` completo,
      # que disparaba el timeout de 20 min del free tier.
      - name: Build (sin regenerar variantes de imagen)
        run: npm run build:no-images

      # Plan v2 §3.10: bundle size budget. Falla la CI si el chunk
      # principal (index-*.js) supera 250KB tras gzip. Catch temprano
      # de regresiones por imports gordos olvidados. Personaje3D y
      # otros chunks lazy no entran en el budget — solo el initial.
      - name: Bundle size budget
        run: |
          MAX_KB=250
          INDEX_FILE=$(ls dist/assets/index-*.js | head -1)
          if [ -z "$INDEX_FILE" ]; then
            echo "❌ No se encontró dist/assets/index-*.js"
            exit 1
          fi
          GZIP_BYTES=$(gzip -c "$INDEX_FILE" | wc -c)
          GZIP_KB=$((GZIP_BYTES / 1024))
          echo "Main bundle: $INDEX_FILE"
          echo "Gzip size: ${GZIP_KB}KB (budget: ${MAX_KB}KB)"
          if [ "$GZIP_KB" -gt "$MAX_KB" ]; then
            echo "❌ Bundle excede el presupuesto de ${MAX_KB}KB gzip"
            exit 1
          fi
          echo "✅ Bundle dentro del presupuesto"

  sync-personajes-check:
    name: sync-personajes (--check drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22 LTS
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      # Audit P2 (2026-05-17): antes corríamos --dry-run, que no fallaba
      # aunque hubiera carpetas enteras de personajes en img/ sin entrar al
      # seed/personajes.js. Resultado: pushes que añadían imágenes pero
      # NO llegaban al frontend ni a la BBDD hasta que alguien recordara
      # correr sync. --check compara seed.json vs escaneo de img/ (con la
      # WIP allowlist aplicada) y falla con exit 1 listando el drift, con
      # mensaje accionable. También valida que los JSON parsean OK.
      - name: Check sync-personajes drift
        run: node scripts/sync-personajes.mjs --check
