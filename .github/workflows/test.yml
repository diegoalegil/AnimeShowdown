name: tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Cancela ejecuciones previas si llega un push nuevo a la misma rama/PR.
# Ahorra minutos de Actions sin afectar a runs de otras ramas.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (Java 21 + Maven)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify Maven Wrapper executable
        run: chmod +x mvnw

      # -B = batch mode (sin colores ASCII en log)
      # --no-transfer-progress = sin spam de descarga de deps
      - name: Run tests
        run: ./mvnw -B --no-transfer-progress test

      # Sube los reports incluso si los tests fallaron, así se puede
      # inspeccionar surefire-reports desde la UI de GitHub Actions.
      - name: Upload surefire reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/target/surefire-reports
          retention-days: 7

  frontend:
    name: frontend (Node 22 + Vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      # Lint primero — si hay errores de ESLint que es rápido fallar aquí
      # antes que pasar 30s en vite build.
      - name: Lint
        run: npm run lint

      # Cache de las variantes de imagen generadas (Plan v2 §3.3-3.4).
      # El script generate-image-variants.mjs procesa 700+ imágenes con
      # sharp y tarda ~5min cold. Idempotente por mtime en local pero
      # CI empieza desde cero cada vez — cacheamos las salidas .avif/.webp.
      #
      # La key incluye el hash del propio script + un hash que cambia
      # cuando se añaden/modifican imágenes originales. Para ese segundo
      # componente listamos los archivos .webp que NO son variantes (no
      # terminan en -300/-600/-1024).
      - name: Cache image variants
        uses: actions/cache@v4
        with:
          path: |
            frontend/img/**/*-300.webp
            frontend/img/**/*-600.webp
            frontend/img/**/*-1024.webp
            frontend/img/**/*.avif
          key: img-variants-v1-${{ hashFiles('frontend/scripts/generate-image-variants.mjs', 'frontend/img/**/*.webp') }}
          restore-keys: |
            img-variants-v1-

      # build = generate-image-variants + generate-sitemap + vite build.
      # Si el cache hit del step anterior está poblado, generate-image-variants
      # termina en ~2s (skip de todo por mtime). Sin cache, tarda 4-5 min.
      - name: Build
        run: npm run build

      # Plan v2 §3.10: bundle size budget. Falla la CI si el chunk
      # principal (index-*.js) supera 250KB tras gzip. Catch temprano
      # de regresiones por imports gordos olvidados. Personaje3D y
      # otros chunks lazy no entran en el budget — solo el initial.
      - name: Bundle size budget
        run: |
          MAX_KB=250
          INDEX_FILE=$(ls dist/assets/index-*.js | head -1)
          if [ -z "$INDEX_FILE" ]; then
            echo "❌ No se encontró dist/assets/index-*.js"
            exit 1
          fi
          GZIP_BYTES=$(gzip -c "$INDEX_FILE" | wc -c)
          GZIP_KB=$((GZIP_BYTES / 1024))
          echo "Main bundle: $INDEX_FILE"
          echo "Gzip size: ${GZIP_KB}KB (budget: ${MAX_KB}KB)"
          if [ "$GZIP_KB" -gt "$MAX_KB" ]; then
            echo "❌ Bundle excede el presupuesto de ${MAX_KB}KB gzip"
            exit 1
          fi
          echo "✅ Bundle dentro del presupuesto"

  sync-personajes-dry-run:
    name: sync-personajes (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Smoke test del script de sincronización: garantiza que los JSON de
      # overrides y display names parsean bien y que ningún cambio reciente
      # en img/ deja al script en estado roto. No escribe nada.
      - name: Dry-run sync-personajes
        run: node scripts/sync-personajes.mjs --dry-run
