name: tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Cancela ejecuciones previas si llega un push nuevo a la misma rama/PR.
# Ahorra minutos de Actions sin afectar a runs de otras ramas.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (Java 21 + Maven)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify Maven Wrapper executable
        run: chmod +x mvnw

      # -B = batch mode (sin colores ASCII en log)
      # --no-transfer-progress = sin spam de descarga de deps
      - name: Run tests
        run: ./mvnw -B --no-transfer-progress test

      # Sube los reports incluso si los tests fallaron, así se puede
      # inspeccionar surefire-reports desde la UI de GitHub Actions.
      - name: Upload surefire reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/target/surefire-reports
          retention-days: 7

  frontend:
    name: frontend (Node 22 + Vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      # Lint primero — si hay errores de ESLint que es rápido fallar aquí
      # antes que pasar 30s en vite build.
      - name: Lint
        run: npm run lint

      # build = generate-sitemap + vite build. Verifica que la web compila
      # con la última data y que el plugin imgFolderPlugin copia las
      # imágenes a dist/img/ sin perderse.
      - name: Build
        run: npm run build

  sync-personajes-dry-run:
    name: sync-personajes (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Smoke test del script de sincronización: garantiza que los JSON de
      # overrides y display names parsean bien y que ningún cambio reciente
      # en img/ deja al script en estado roto. No escribe nada.
      - name: Dry-run sync-personajes
        run: node scripts/sync-personajes.mjs --dry-run
