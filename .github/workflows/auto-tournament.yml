name: Auto-generate tournament

# Cron job que crea un torneo aleatorio cada 3 días llamando al endpoint
# /api/cron/torneos/auto-generar del backend. Se autentica con
# X-Cron-Secret header (no login JWT). Evita depender de una sesión de
# administrador y sigue funcionando aunque el admin active 2FA TOTP.
#
# Para activar:
# 1. Settings → Secrets and variables → Actions → New repository secret:
#    - API_URL = https://api.animeshowdown.dev (o el upstream Railway)
#    - CRON_SECRET = (string random largo, debe coincidir con
#      APP_CRON_SECRET en Railway env vars)
# 2. (opcional) Settings → Actions → workflow_dispatch para botón manual.
#
# Para desactivar el endpoint en caliente: en Railway Variables setear
# TOURNAMENT_AUTO_ENABLED=false. La acción seguirá llamando pero el backend
# devolverá 503 Service Unavailable.
#
# Idempotencia 24h: si ya hay un torneo auto reciente, el endpoint devuelve
# 409 con id del existente. La acción lo detecta y termina con éxito.

on:
  schedule:
    # Cada 3 días a las 09:00 UTC. Sintaxis cron: min hour day month dow
    - cron: '0 9 */3 * *'
  workflow_dispatch:
    inputs:
      tamano:
        description: 'Tamaño del torneo (8 o 16)'
        required: false
        default: '8'
        type: choice
        options:
          - '8'
          - '16'
      force:
        description: 'Forzar aunque haya un auto-torneo en últimas 24h'
        required: false
        default: false
        type: boolean

jobs:
  generate:
    name: Generar torneo automático
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call POST /api/cron/torneos/auto-generar
        env:
          API_URL: ${{ secrets.API_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          TAMANO: ${{ inputs.tamano || '8' }}
          FORCE: ${{ inputs.force || 'false' }}
        run: |
          if [ -z "$API_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::Faltan secrets API_URL o CRON_SECRET en el repo"
            exit 1
          fi
          BODY="{\"tamano\":$TAMANO,\"force\":$FORCE}"
          echo "Body: $BODY"

          # -w para capturar status code, -o para guardar body
          HTTP=$(curl -sS -X POST "$API_URL/api/cron/torneos/auto-generar" \
            -H "X-Cron-Secret: $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            -w "%{http_code}" \
            -o response.json)

          echo "HTTP $HTTP"
          cat response.json

          case "$HTTP" in
            201)
              ID=$(python3 -c "import json; print(json.load(open('response.json'))['id'])")
              NOMBRE=$(python3 -c "import json; print(json.load(open('response.json'))['nombre'])")
              echo "::notice::✓ Torneo creado (id=$ID): $NOMBRE"
              ;;
            401)
              echo "::error::Cron secret inválido — verifica CRON_SECRET en repo y APP_CRON_SECRET en Railway"
              exit 1
              ;;
            409)
              echo "::warning::Ya existe un torneo auto en las últimas 24h. No se crea otro."
              ;;
            503)
              echo "::warning::Auto-generación deshabilitada en backend (TOURNAMENT_AUTO_ENABLED=false)"
              ;;
            *)
              echo "::error::Status inesperado HTTP $HTTP"
              exit 1
              ;;
          esac

      - name: Upload response artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tournament-response-${{ github.run_id }}
          path: response.json
          retention-days: 30
