name: e2e

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node 22 LTS
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright runner
        working-directory: frontend
        run: |
          npm install --no-save @playwright/test@1.57.0
          npx playwright install --with-deps chromium

      - name: Start backend H2
        working-directory: backend
        run: |
          chmod +x mvnw
          ./mvnw -B --no-transfer-progress \
            -Dspring-boot.run.profiles=test \
            -Dspring-boot.run.useTestClasspath=true \
            -Dspring-boot.run.arguments="--server.port=8080" \
            spring-boot:run > ../backend-e2e.log 2>&1 &
          echo $! > ../backend-e2e.pid

      - name: Wait for backend
        run: |
          for i in {1..90}; do
            if curl -fsS http://127.0.0.1:8080/actuator/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat backend-e2e.log
          exit 1

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: http://127.0.0.1:8080
        run: npm run build:no-images

      - name: Start frontend preview
        working-directory: frontend
        run: |
          npx vite preview --host 127.0.0.1 --port 4173 > ../frontend-e2e.log 2>&1 &
          echo $! > ../frontend-e2e.pid

      - name: Wait for frontend
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:4173 >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat frontend-e2e.log
          exit 1

      - name: Run Playwright E2E
        working-directory: frontend
        env:
          E2E_BASE_URL: http://127.0.0.1:4173
          E2E_API_URL: http://127.0.0.1:8080
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

      - name: Upload E2E logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: e2e-service-logs
          path: |
            backend-e2e.log
            frontend-e2e.log
          retention-days: 7
