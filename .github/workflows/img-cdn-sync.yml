name: IMG CDN sync

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Subir cambios reales a R2/CDN. Si false, solo plan local."
        required: true
        type: choice
        default: "false"
        options:
          - "false"
          - "true"
      include_avif:
        description: "Incluir variantes AVIF, aunque la UI actual no las referencia."
        required: true
        type: choice
        default: "false"
        options:
          - "false"
          - "true"

concurrency:
  group: img-cdn-sync
  cancel-in-progress: false

jobs:
  sync:
    name: sync /img to R2-compatible CDN
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node 22 LTS
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Plan local
        env:
          ANIMESHOWDOWN_IMG_CDN_BASE_URL: ${{ secrets.ANIMESHOWDOWN_IMG_CDN_BASE_URL || 'https://assets.animeshowdown.dev/img' }}
          SYNC_IMG_INCLUDE_AVIF: ${{ inputs.include_avif }}
        run: node scripts/sync-img-cdn.mjs --plan

      - name: Apply sync to CDN
        if: ${{ inputs.apply == 'true' }}
        env:
          ANIMESHOWDOWN_IMG_CDN_BASE_URL: ${{ secrets.ANIMESHOWDOWN_IMG_CDN_BASE_URL || 'https://assets.animeshowdown.dev/img' }}
          R2_IMG_ENDPOINT: ${{ secrets.R2_IMG_ENDPOINT }}
          R2_IMG_ACCESS_KEY_ID: ${{ secrets.R2_IMG_ACCESS_KEY_ID }}
          R2_IMG_SECRET_ACCESS_KEY: ${{ secrets.R2_IMG_SECRET_ACCESS_KEY }}
          R2_IMG_BUCKET: ${{ secrets.R2_IMG_BUCKET }}
          R2_IMG_PREFIX: ${{ secrets.R2_IMG_PREFIX || 'img' }}
          SYNC_IMG_INCLUDE_AVIF: ${{ inputs.include_avif }}
        run: node scripts/sync-img-cdn.mjs --apply
