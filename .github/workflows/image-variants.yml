name: image variants

on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/img/**'
      - 'frontend/scripts/image-variants-manifest.json'
      - 'frontend/scripts/generate-image-variants.mjs'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
  push:
    branches: [main]
    paths:
      - 'frontend/img/**'
      - 'frontend/scripts/image-variants-manifest.json'
      - 'frontend/scripts/generate-image-variants.mjs'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
  workflow_dispatch:

concurrency:
  group: image-variants-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    name: sharp variants cache
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node 22 LTS
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Check responsive WebP variants
        if: github.event_name == 'pull_request'
        run: npm run build:images:check

      - name: Generate responsive WebP variants
        if: github.event_name != 'pull_request'
        run: npm run build:images

      - name: Pack generated variants
        if: github.event_name != 'pull_request'
        run: |
          find img -type f \( \
            -name '*-300.webp' -o -name '*-600.webp' \
          \) -print0 | tar --null -czf image-variants.tgz --files-from -
          du -h image-variants.tgz

      - name: Upload image variants artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: image-variants-${{ github.sha }}
          path: frontend/image-variants.tgz
          retention-days: 30
