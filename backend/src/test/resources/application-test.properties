spring.application.name=animeshowdown-test

# Audit fix #4 follow-up (2026-05-21): permite que TestAsyncConfig
# override el bean 'taskExecutor' definido en AsyncConfig de prod.
# El override es INTENCIONAL — tests usan SyncTaskExecutor para que
# los @Async corran sincronos y las assertions sean deterministas
# (sin esto, voto.persistencia hace @Async, la fila aparece en BBDD
# despues que el test asserta, falla por race condition).
# Spring Boot 2.1+ deshabilita override por defecto; lo reactivamos
# SOLO en perfil test (prod sigue estricto, sin riesgo).
spring.main.allow-bean-definition-overriding=true

# H2 in-memory para tests
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Plan v2 §2.7: ddl-auto=validate también en tests para que las migraciones
# de Flyway sean la única fuente de verdad del schema. Si una migración
# nueva V{n}__... olvida una columna que la entidad sí declara, los tests
# fallan en arranque — catch temprano antes de prod.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Flyway corre también en tests sobre H2 (MODE=PostgreSQL). El SQL en
# resources/db/migration debe ser portable entre ambos motores. Sin
# baseline-on-migrate=true porque H2 in-memory siempre nace vacía y
# Flyway puede aplicar V1 desde cero.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT (clave separada para tests)
jwt.secret=clave_de_test_solo_para_unit_tests_no_usar_en_prod
jwt.expiration=3600000

# Rate limiting OFF en tests — los tests crean varios usuarios en serie
# y dispararían el límite de 5/min de RateLimitFilter (Plan v2 §2.1).
app.ratelimit.enabled=false

# Refresh cookie sin Secure flag en tests porque H2 + MockMvc no es HTTPS.
app.refresh-token.cookie-secure=false

# Email verification OFF en tests (Plan v2 §2.4) — los tests de voto
# crean usuarios via /registro y los usan inmediatamente sin pasar por
# el link de verificación (eso requeriría capturar el email enviado por
# EmailService, lo cual va más allá del scope unitario).
app.email-verification.required-to-vote=false

# 2FA TOTP (Plan v2 §2.3): claves fijas para tests, secrets cifrados
# nunca salen del H2 in-memory. El salt es hex 16 chars como en prod.
app.totp.issuer=AnimeShowdown-Test
app.totp.encryption-key=test_encryption_key_solo_para_unit_tests
app.totp.encryption-salt=5c0744940b5c369b

# Auditoría P1.1: admin.emails ya no tiene default público en código.
# Para tests, configuramos explícitamente el email del owner — los
# helpers tokenAdmin() crean ese user y disparan la promoción.
admin.emails=diegogildam@gmail.com

# Observabilidad: mantener Prometheus activo en tests para cubrir el endpoint
# real que usa Railway/Prometheus en producción.
management.endpoints.web.exposure.include=health,info,prometheus
management.prometheus.metrics.export.enabled=true

# El scheduler de status se testea por endpoint/repositorio; no debe disparar
# pings HTTP reales durante los tests de MockMvc.
app.status.monitor.enabled=false
