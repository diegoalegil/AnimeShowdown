spring.application.name=animeshowdown-test

# H2 in-memory para tests
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# JWT (clave separada para tests)
jwt.secret=clave_de_test_solo_para_unit_tests_no_usar_en_prod
jwt.expiration=3600000

# Rate limiting OFF en tests — los tests crean varios usuarios en serie
# y dispararían el límite de 5/min de RateLimitFilter (Plan v2 §2.1).
app.ratelimit.enabled=false

# Refresh cookie sin Secure flag en tests porque H2 + MockMvc no es HTTPS.
app.refresh-token.cookie-secure=false
