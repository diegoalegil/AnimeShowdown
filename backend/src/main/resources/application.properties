spring.application.name=animeshowdown

# Database (sobreescribir con env vars en producción)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/animeshowdown_db}
spring.datasource.username=${DB_USER:animeshowdown_user}
spring.datasource.password=${DB_PASSWORD:CHANGE_ME_IN_PROD}

# JPA. ddl-auto=validate (Plan v2 §2.7): Hibernate solo VERIFICA que el
# schema en BBDD coincide con las entidades; no crea ni altera nada. Las
# migraciones de schema viven ahora en resources/db/migration y las gestiona
# Flyway al arrancar. Si hay desincronización entre el código y la BBDD,
# el arranque falla con error claro — preferible al silencio de update
# que acumulaba columnas zombies sin que nadie se enterara.
spring.jpa.hibernate.ddl-auto=${JPA_DDL:validate}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SHOW_SQL:false}

# Flyway: migraciones versionadas. Plan v2 §2.7.
# baseline-on-migrate=true permite que la primera vez que Flyway se
# ejecute contra una BBDD pre-existente (Neon en producción, ya con todas
# las tablas creadas por el ddl-auto=update anterior), cree su tabla
# flyway_schema_history y marque V1 como aplicada SIN ejecutarla. Las
# próximas migraciones (V2, V3, ...) se aplican normal.
# baseline-version=1 indica qué versión es el "estado de partida" cuando
# se hace el baseline. Coincide con el V1__initial_schema.sql que
# representa el snapshot del schema actual en producción.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration

# JWT (en producción definir JWT_SECRET con una clave larga aleatoria).
# Plan v2 §1.3: access token corto (15 min) + refresh token httpOnly cookie
# 30 días gestionado por RefreshTokenService. Antes el JWT vivía 1h en
# localStorage — ahora vive 15min en memoria, refresh automático tras 401.
jwt.secret=${JWT_SECRET:CHANGE_ME_IN_PROD_openssl_rand_base64_64}
jwt.expiration=${JWT_EXPIRATION:900000}

# Refresh token TTL en días. 30 = mes; tras eso el usuario debe re-login.
app.refresh-token.ttl-days=${REFRESH_TOKEN_TTL_DAYS:30}

# Cookie del refresh: en producción Secure=true requiere HTTPS. En dev
# local sin HTTPS el navegador rechaza la cookie si secure=true; sobrescribe
# con REFRESH_COOKIE_SECURE=false en development.
app.refresh-token.cookie-secure=${REFRESH_COOKIE_SECURE:true}

# Rate limiting in-memory por IP (Plan v2 §2.1). Aplica a /auth/login,
# /auth/registro, /auth/forgot-password, /auth/reset-password y
# /enfrentamientos/*/votar con 5/min + 50/hora compuestos. Los tests lo
# desactivan vía application-test.properties para no contaminar resultados.
app.ratelimit.enabled=${RATELIMIT_ENABLED:true}

# Server (para hosts que inyectan PORT como Render, Koyeb, Heroku)
server.port=${PORT:8080}

# Compresión HTTP para payloads JSON grandes/medianos (catálogo, ranking).
# Cloudflare puede recomprimir en edge, pero activarlo aquí cubre Railway
# directo y entornos de preview sin proxy.
server.compression.enabled=${SERVER_COMPRESSION_ENABLED:true}
server.compression.mime-types=application/json,text/html,text/xml,text/plain,text/css,text/javascript,application/javascript
server.compression.min-response-size=1024

# Respetar X-Forwarded-* del proxy (Cloudflare → Railway → Tomcat). Sin esto
# Spring construye URLs absolutas con http://host:8080 internos en lugar del
# https://api.animeshowdown.dev real. Crítico para OAuth2: el redirect_uri que
# se envía a Google/Discord se construye desde la request actual; sin
# forward-headers-strategy llega como http:// y el proveedor lo rechaza
# porque solo whitelisteamos https://api.animeshowdown.dev/login/oauth2/code/*.
server.forward-headers-strategy=${FORWARD_HEADERS_STRATEGY:framework}

# Cookie de sesión (JSESSIONID) explícitamente Lax + Secure. Necesario para
# que OAuth2 funcione: Spring guarda la authorization request en la sesión
# entre /oauth2/authorization/google y /login/oauth2/code/google. Cuando
# Google redirige de vuelta, el browser ve la navegación como cross-site
# (la inicia accounts.google.com). Sin SameSite=Lax explícito Safari/ITP
# trata la cookie como tracking y NO la envía → Spring no encuentra la
# authorization request original → falla con [authorization_request_not_found].
# Lax + Secure es el setting mínimo para que el callback cross-site funcione.
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true

# Optimización de arranque para entornos con poca CPU (Render Free)
spring.main.lazy-initialization=${LAZY_INIT:false}
spring.jpa.open-in-view=false

# HikariCP tuning (Plan v2 §2.9). Pool dimensionado para Railway free
# tier + Neon serverless: poco tráfico simultáneo pero arranques fríos.
# maximum-pool-size 10  : suficiente para concurrencia moderada.
# minimum-idle 2        : mantenemos 2 conexiones calientes para no pagar
#                          el handshake en cada request de horas valle.
# connection-timeout 20s: si Neon está cold-start, esperamos hasta 20s
#                          antes de fallar — el primer hit del día es lento.
# idle-timeout 5min     : cierra conexiones ociosas para no quemar cuota.
# max-lifetime 15min    : recicla agresivo, Neon corta conexiones tras
#                          ventanas de inactividad y queremos limpiarlas.
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:2}
spring.datasource.hikari.connection-timeout=${DB_CONN_TIMEOUT:20000}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT:300000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME:900000}

# Actuator: health/info para el host + prometheus para métricas de prod.
management.endpoints.web.exposure.include=health,info,prometheus
management.prometheus.metrics.export.enabled=${PROMETHEUS_ENABLED:true}
management.endpoint.health.show-details=never
# Audit P2 (2026-05-17): CatalogoHealthIndicator emite status "DRIFT" cuando
# el set de slugs en BBDD no coincide con el del seed empaquetado. Spring Boot
# por default mapea cualquier status no estándar a 503 (HTTP Service Unavailable),
# lo que provocaría que Cloudflare/Railway healthcheck rebooteara la app —
# pero el API funciona perfectamente con el catálogo que tiene, el drift es
# informativo. Mapeamos DRIFT a 200 explícitamente para que el detalle quede
# visible en /actuator/health sin romper la salud del servicio.
management.endpoint.health.status.http-mapping.DRIFT=200

# Status page pública (/status). El scheduler guarda una muestra por minuto
# contra /actuator/health y el endpoint /api/status agrega 24h/7d/30d/90d.
app.status.monitor.enabled=${STATUS_MONITOR_ENABLED:true}
app.status.health-url=${STATUS_HEALTH_URL:http://localhost:${server.port}/actuator/health}
app.status.monitor.fixed-rate-ms=${STATUS_MONITOR_FIXED_RATE_MS:60000}
app.status.monitor.initial-delay-ms=${STATUS_MONITOR_INITIAL_DELAY_MS:15000}
app.status.monitor.timeout-ms=${STATUS_MONITOR_TIMEOUT_MS:2500}

# springdoc OpenAPI (Plan v2 §2.15). Auto-genera spec accesible en:
#   /v3/api-docs          → JSON spec
#   /v3/api-docs.yaml     → YAML spec
#   /swagger-ui.html      → Swagger UI interactivo
# Las tres rutas ya estaban permitidas en SecurityConfig desde el día 1
# por previsión, así que basta con añadir la dep al pom y configurar
# metadatos de la API aquí.
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
# Group default: solo expone endpoints bajo /api/**. Excluye actuator y
# rutas internas para que el doc público sea limpio.
springdoc.paths-to-match=/api/**

# Email vía Resend (HTTPS, no requiere SMTP outbound — funciona en Railway)
# Configurar en producción:
#   RESEND_API_KEY=re_xxxxxxxxxxxxxxxx (de https://resend.com/api-keys)
#   RESEND_FROM=onboarding@resend.dev (test sender, solo envía al email registrado)
#                  o un email de un dominio verificado en Resend
email.resend.api-key=${RESEND_API_KEY:}
email.resend.from=${RESEND_FROM:onboarding@resend.dev}

# URL base del frontend, usada por EmailVerificationService para construir
# el link del email (Plan v2 §2.4). En dev local sobrescribir con
# FRONTEND_BASE_URL=http://localhost:5173.
app.frontend-base-url=${FRONTEND_BASE_URL:https://animeshowdown.dev}

# OAuth social login (Plan v2 §7.1). El backend maneja el callback,
# emite la misma refresh cookie httpOnly que /api/auth/login y redirige
# al frontend /auth/callback para que hidrate el JWT vía /api/auth/refresh.
app.oauth.redirect-base=${APP_OAUTH_REDIRECT_BASE:${app.frontend-base-url}}

# Base URL del API expuesta hacia los proveedores OAuth. Tiene que coincidir
# byte a byte con lo whitelisteado en Google Cloud Console y Discord Developer
# Portal (sin trailing slash). En local pasar OAUTH_API_BASE=http://localhost:8080
# para que el flow funcione contra el backend de dev. Hardcodear los
# redirect-uri (en vez del placeholder {baseUrl}) evita depender de los
# X-Forwarded-* del proxy: Railway termina TLS y reenvía como http://, lo
# que hace que Spring construya redirect_uri=http://api.animeshowdown.dev/...
# y Google/Discord rechacen porque solo aceptan https://.
app.oauth.api-base=${OAUTH_API_BASE:https://api.animeshowdown.dev}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:CHANGE_ME_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:CHANGE_ME_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${app.oauth.api-base}/login/oauth2/code/google
spring.security.oauth2.client.registration.discord.client-id=${DISCORD_CLIENT_ID:CHANGE_ME_DISCORD_CLIENT_ID}
spring.security.oauth2.client.registration.discord.client-secret=${DISCORD_CLIENT_SECRET:CHANGE_ME_DISCORD_CLIENT_SECRET}
spring.security.oauth2.client.registration.discord.client-name=Discord
spring.security.oauth2.client.registration.discord.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.discord.redirect-uri=${app.oauth.api-base}/login/oauth2/code/discord
spring.security.oauth2.client.registration.discord.scope=identify,email
spring.security.oauth2.client.provider.discord.authorization-uri=https://discord.com/api/oauth2/authorize
spring.security.oauth2.client.provider.discord.token-uri=https://discord.com/api/oauth2/token
spring.security.oauth2.client.provider.discord.user-info-uri=https://discord.com/api/users/@me
spring.security.oauth2.client.provider.discord.user-name-attribute=id

# Vida del token de verificación de email. 24h cubre el caso "abro el
# correo al día siguiente". Si caduca, el usuario puede pedir reenvio
# desde el banner persistente.
app.email-verification.ttl-hours=${EMAIL_VERIFICATION_TTL_HOURS:24}

# Si true, los endpoints de voto (Plan v2 §1.1) rechazan con 403 a
# usuarios PENDIENTE. En prod true (estricto); los tests lo desactivan
# en application-test.properties para no obligar al fixture a simular
# el flujo completo de email.
app.email-verification.required-to-vote=${EMAIL_VERIFICATION_REQUIRED:true}

# Cron de torneos automáticos — POST /api/admin/torneos/auto-generar
# Lo dispara la GitHub Action .github/workflows/auto-tournament.yml cada 3 días.
# Cambiar a false para apagar en caliente sin redeploy de código.
app.tournament.auto.enabled=${TOURNAMENT_AUTO_ENABLED:true}

# Secret compartido entre backend ↔ GitHub Action que llama
# POST /api/cron/torneos/auto-generar. El relaxed binding de Spring Boot
# debería convertir APP_CRON_SECRET → app.cron.secret automáticamente,
# pero al dejarlo explícito documentamos qué env var hay que setear en
# Railway y evitamos sorpresas si la convención cambia entre versiones.
# Vacío = el endpoint devuelve 401 a todas las llamadas (modo seguro).
# En producción definir con: openssl rand -hex 32
app.cron.secret=${APP_CRON_SECRET:}

# 2FA TOTP (Plan v2 §2.3).
#   - app.totp.issuer: nombre que verá el usuario en su app authenticator
#     al añadir la cuenta ("AnimeShowdown:diego@...").
#   - app.totp.encryption-key: clave AES con la que se cifran los secrets
#     TOTP en BBDD. En producción inyectar TOTP_ENCRYPTION_KEY con un
#     valor largo aleatorio (openssl rand -base64 32). Si se filtra la
#     BBDD pero no el .env, los secrets son inservibles.
#   - app.totp.encryption-salt: 16 hex chars. NO es secreto, solo aleatoriza
#     la derivación PBKDF2 — se puede dejar fijo.
app.totp.issuer=${TOTP_ISSUER:AnimeShowdown}
app.totp.encryption-key=${TOTP_ENCRYPTION_KEY:CHANGE_ME_IN_PROD_openssl_rand_base64_32}
app.totp.encryption-salt=${TOTP_ENCRYPTION_SALT:5c0744940b5c369b}

# CORS — orígenes permitidos separados por coma. Antes vivían hardcoded en
# SecurityConfig.java; ahora se externalizan para poder cambiar dominios sin
# redeploy. En prod inyectar CORS_ALLOWED_ORIGINS con la lista real.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://animeshowdown.vercel.app,https://animeshowdown.pages.dev,https://animeshowdown.dev,https://www.animeshowdown.dev}
cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:https://animeshowdown-*.vercel.app,https://*.animeshowdown.pages.dev}

# Caché Caffeine: la configuración por cache (jikan-top-characters 1h,
# og-personaje/og-torneo 7d) vive en CacheConfig.java porque cada cache
# necesita TTL distinto y el property spring.cache.caffeine.spec es
# global. Solo dejamos el type aquí; las caches se definen como beans.
spring.cache.type=caffeine

# Redis cache distribuido opcional. En local queda Caffeine; en Railway/Upstash
# activar con SPRING_CACHE_TYPE=redis y REDIS_URL=redis://...
# Redis es opt-in con spring.cache.type=redis. En Railway/Upstash configurar
# SPRING_DATA_REDIS_URL; no seteamos spring.data.redis.url vacío porque Boot
# lo interpreta como URL inválida durante el arranque.
spring.data.redis.repositories.enabled=false
management.health.redis.enabled=${REDIS_HEALTH_ENABLED:false}
spring.cache.redis.use-key-prefix=true
spring.cache.redis.key-prefix=as:

# Comentarios de fichas: moderación básica + rate limit por usuario.
app.comentarios.rate-limit-per-hour=${COMENTARIOS_RATE_LIMIT_PER_HOUR:5}
app.comentarios.profanity-stems=${COMENTARIOS_PROFANITY_STEMS:puta,puto,mierd,joder,cabron,imbecil,pendej,cojon,fuck,shit,bitch,asshole,bastard,cunt,dick}

# URL base donde el backend descarga las imágenes de personajes para
# componer las OG images server-side (Plan v2 §1.2). En dev se puede
# apuntar a http://localhost:5173 via env var IMAGES_BASE_URL.
app.images.base-url=${IMAGES_BASE_URL:https://animeshowdown.dev}

# Resilience4j para JikanService: retry con backoff exponencial, circuit
# breaker que se abre tras 50% de fallos en 10 llamadas, y timeout duro de
# 5s por request a Jikan (jikan suele ir bien <500ms; 5s es generoso).
resilience4j.retry.instances.jikan.max-attempts=3
resilience4j.retry.instances.jikan.wait-duration=500ms
resilience4j.retry.instances.jikan.exponential-backoff-multiplier=2
resilience4j.retry.instances.jikan.retry-exceptions=org.springframework.web.client.ResourceAccessException,org.springframework.web.client.HttpServerErrorException,java.io.IOException
resilience4j.circuitbreaker.instances.jikan.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.jikan.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.jikan.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.jikan.permitted-number-of-calls-in-half-open-state=3
resilience4j.timelimiter.instances.jikan.timeout-duration=5s
