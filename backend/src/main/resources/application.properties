spring.application.name=animeshowdown

# Database (sobreescribir con env vars en producción)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/animeshowdown_db}
spring.datasource.username=${DB_USER:animeshowdown_user}
spring.datasource.password=${DB_PASSWORD:CHANGE_ME_IN_PROD}

# JPA. ddl-auto=validate: Hibernate solo VERIFICA que el
# schema en BBDD coincide con las entidades; no crea ni altera nada. Las
# migraciones de schema viven ahora en resources/db/migration y las gestiona
# Flyway al arrancar. Si hay desincronización entre el código y la BBDD,
# el arranque falla con error claro — preferible al silencio de update
# que acumulaba columnas zombies sin que nadie se enterara.
spring.jpa.hibernate.ddl-auto=${JPA_DDL:validate}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SHOW_SQL:false}
# Batch fetch de asociaciones perezosas/EAGER no inicializadas: en vez de un SELECT
# por fila al navegar relaciones en bucle (N+1), Hibernate las agrupa en IN-queries
# de hasta este tamaño. Mitiga globalmente los N+1 de las rutas que recorren listas
# (feed de actividad, resolución de predicciones de torneo, migración de votos).
# Solo cambia CÓMO se cargan (batched), no QUÉ se carga: sin impacto de corrección.
spring.jpa.properties.hibernate.default_batch_fetch_size=${HIBERNATE_BATCH_FETCH_SIZE:50}

# Flyway: migraciones versionadas.
# baseline-on-migrate=true permite que la primera vez que Flyway se
# ejecute contra una BBDD pre-existente (la BBDD de producción, ya con
# todas las tablas creadas), cree su tabla flyway_schema_history y marque
# V1 como aplicada SIN ejecutarla. Las próximas migraciones (V2, V3, ...)
# se aplican normal. Nota: si se migra de proveedor con pg_dump/pg_restore
# completo, la tabla flyway_schema_history viaja en el dump y Flyway no
# re-aplica nada.
# baseline-version=1 indica qué versión es el "estado de partida" cuando
# se hace el baseline. Coincide con el V1__initial_schema.sql que
# representa el snapshot del schema actual en producción.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration

# JWT (en producción definir JWT_SECRET con una clave larga aleatoria).
# Access token corto (15 min) + refresh token httpOnly cookie de 30 días
# gestionado por RefreshTokenService. El JWT vive en memoria y se renueva
# automáticamente tras 401.
jwt.secret=${JWT_SECRET:CHANGE_ME_IN_PROD_openssl_rand_base64_64}
jwt.expiration=${JWT_EXPIRATION:900000}

# Refresh token TTL en días. 30 = mes; tras eso el usuario debe re-login.
app.refresh-token.ttl-days=${REFRESH_TOKEN_TTL_DAYS:30}

# Zona horaria canónica del producto para resets diarios visibles al usuario
# (drops, misión diaria y cofre). UTC conserva el comportamiento desplegado.
app.product-zone=${PRODUCT_ZONE:UTC}

# Cookie del refresh: en producción Secure=true requiere HTTPS. En dev
# local sin HTTPS el navegador rechaza la cookie si secure=true; sobrescribe
# con REFRESH_COOKIE_SECURE=false en development.
app.refresh-token.cookie-secure=${REFRESH_COOKIE_SECURE:true}

# Web Push / VAPID. Las keys se generan fuera del repo y se inyectan por env:
#   VAPID_PUBLIC_KEY=<base64url publico>
#   VAPID_PRIVATE_KEY=<base64url privado>
app.push.vapid.public-key=${VAPID_PUBLIC_KEY:}
app.push.vapid.private-key=${VAPID_PRIVATE_KEY:}
app.push.vapid.subject=${VAPID_SUBJECT:mailto:diegogildam@gmail.com}
# Proveedores Web Push admitidos para evitar egress server-side a destinos arbitrarios.
app.push.allowed-endpoint-hosts=${PUSH_ALLOWED_ENDPOINT_HOSTS:fcm.googleapis.com,updates.push.services.mozilla.com,*.push.services.mozilla.com,webpush.push.apple.com,*.push.apple.com,*.notify.windows.com}

# Rate limiting in-memory por IP con politicas por endpoint. Login 10/min,
# registro 5/min, reset/forgot-password 3/min, votos 60/min y newsletter 5/h.
# Los tests de integracion lo desactivan via application-test.properties para
# no contaminar resultados.
app.ratelimit.enabled=${RATELIMIT_ENABLED:true}

# Audit log: retencion automatica. El job corre a las 03:00 UTC y se puede
# apagar en caliente con AUDIT_CLEANUP_ENABLED=false si produccion necesita
# pausar mantenimiento. Los eventos mas sensibles retienen menos tiempo.
app.audit.cleanup.enabled=${AUDIT_CLEANUP_ENABLED:true}
app.audit.cleanup.cron=${AUDIT_CLEANUP_CRON:0 0 3 * * *}
app.audit.cleanup.retention-days=${AUDIT_CLEANUP_RETENTION_DAYS:90}
app.audit.cleanup.sensitive-retention-days=${AUDIT_CLEANUP_SENSITIVE_RETENTION_DAYS:30}

# Server (para hosts que inyectan PORT como Render, Koyeb, Heroku)
server.port=${PORT:8080}

# Compresión HTTP para payloads JSON grandes/medianos (catálogo, ranking).
# Cloudflare puede recomprimir en edge, pero activarlo aquí cubre Railway
# directo y entornos de preview sin proxy.
server.compression.enabled=${SERVER_COMPRESSION_ENABLED:true}
server.compression.mime-types=application/json,text/html,text/xml,text/plain,text/css,text/javascript,application/javascript
server.compression.min-response-size=1024

# Respetar X-Forwarded-* del proxy (Cloudflare → Railway → Tomcat) para
# construir URLs absolutas https (sitemap, OG) en lugar de http://host:8080.
#
# §SEC-001: 'native' (RemoteIpValve de Tomcat) en vez de 'framework'
# (ForwardedHeaderFilter de Spring). 'framework' aplicaba X-Forwarded-For SIN
# validar el origen → un atacante pegando directo a Railway podía rotar XFF y
# spoofear su IP, evadiendo el rate-limit y el anti-fraude por IP. 'native'
# SOLO honra XFF cuando el peer del socket es un proxy
# de confianza (internalProxies = rangos privados/loopback por defecto); un peer
# público (atacante directo) NO puede spoofear → getRemoteAddr queda en su IP
# real y ClientIpExtractor resuelve el cliente real vía CF-Connecting-IP (que
# valida contra los rangos Cloudflare en TrustedProxyChecker). Sigue procesando
# X-Forwarded-Proto, así que las URLs https no se rompen.
# NOTA: NO se añade Cloudflare a internalProxies (evita un regex CIDR frágil):
# ClientIpExtractor ya resuelve el cliente real para peers Cloudflare.
server.forward-headers-strategy=${FORWARD_HEADERS_STRATEGY:native}

# Cookie de sesión (JSESSIONID) explícitamente Lax + Secure. Necesario para
# que OAuth2 funcione: Spring guarda la authorization request en la sesión
# entre /oauth2/authorization/google y /login/oauth2/code/google. Cuando
# Google redirige de vuelta, el browser ve la navegación como cross-site
# (la inicia accounts.google.com). Sin SameSite=Lax explícito Safari/ITP
# trata la cookie como tracking y NO la envía → Spring no encuentra la
# authorization request original → falla con [authorization_request_not_found].
# Lax + Secure es el setting mínimo para que el callback cross-site funcione.
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true

# Optimización de arranque para entornos con poca CPU (Render Free)
spring.main.lazy-initialization=${LAZY_INIT:false}
spring.jpa.open-in-view=false

# HikariCP tuning. Pool dimensionado para Railway + Supabase (Postgres
# gestionado, free tier): poco tráfico simultáneo.
# Supabase factura por ALMACENAMIENTO, no por compute-time, así que mantener
# min-idle conexiones calientes 24/7 NO penaliza. (Al contrario que Neon
# serverless, donde un pool siempre-activo impedía el scale-to-zero y quemaba
# la cuota de compute — ése fue el motivo de migrar fuera de Neon en 2026-05.)
# maximum-pool-size 10  : holgado para concurrencia moderada y dentro del
#                          límite de conexiones del free tier de Supabase.
# minimum-idle 2        : 2 conexiones calientes para evitar el handshake en
#                          cada request de horas valle. Sin coste en Supabase.
# connection-timeout 20s: margen amplio para el primer establecimiento.
# idle-timeout 5min     : recicla conexiones ociosas (higiene del pool).
# max-lifetime 15min    : recicla agresivo para soltar conexiones viejas.
# NOTA: usar el SESSION POOLER de Supabase (host aws-0-<region>.pooler.supabase.com
# :5432, user postgres.<project-ref>) — es IPv4 y compatible con los prepared
# statements de JDBC. NO el transaction pooler (puerto 6543, los rompe) ni la
# conexión directa (db.<ref>.supabase.co, suele ser IPv6-only y Railway no la resuelve).
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:2}
spring.datasource.hikari.connection-timeout=${DB_CONN_TIMEOUT:20000}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT:300000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME:900000}

# Observabilidad — logging estructurado JSON (nativo Spring Boot 3.4+, sin
# dependencias). Desactivado por defecto: la consola sale legible para dev.
# En producción exporta LOGGING_STRUCTURED_FORMAT_CONSOLE=ecs (relaxed binding
# → logging.structured.format.console) para emitir JSON ECS que Railway/un
# colector agregan y correlacionan. No se fija aquí a propósito: un valor vacío
# rompería el resolver de formato; se inyecta sólo por env en prod.

# Actuator: health/info para el host + prometheus para métricas de prod.
# health e info son públicos. prometheus está PROTEGIDO con header
# X-Prometheus-Token validado por PrometheusScrapeAuthFilter. Sin el token
# configurado, /actuator/prometheus devuelve 401
# a todos los requests (modo fail-closed).
management.endpoints.web.exposure.include=health,info,prometheus
management.prometheus.metrics.export.enabled=${PROMETHEUS_ENABLED:true}
# Secret compartido con el job de Prometheus. En Railway/docker setear con:
#   APP_PROMETHEUS_SCRAPE_TOKEN=$(openssl rand -hex 32)
# Vacío = endpoint cerrado (default seguro).
app.prometheus.scrape-token=${APP_PROMETHEUS_SCRAPE_TOKEN:}
management.endpoint.health.show-details=never
# CatalogoHealthIndicator emite status "DRIFT" cuando el set de slugs en
# BBDD no coincide con el del seed empaquetado. Spring Boot por default
# mapea cualquier status no estándar a 503 (HTTP Service Unavailable),
# lo que provocaría que Cloudflare/Railway healthcheck rebooteara la app.
# Mapeamos DRIFT a 200 explícitamente porque el drift es informativo y no
# debe romper la salud del servicio.
management.endpoint.health.status.http-mapping.DRIFT=200
# EmailHealthIndicator emite "DEGRADED" cuando el email transaccional está mal
# configurado (sin RESEND_API_KEY, sender de prueba) o la cola de fallos crece.
# Mismo motivo que DRIFT: es informativo y NO debe devolver 503 (un reboot no
# arregla un secreto ausente). Se mapea a 200 explícitamente.
management.endpoint.health.status.http-mapping.DEGRADED=200

# Status page pública (/status). El scheduler guarda una muestra por minuto
# contra /actuator/health y el endpoint /api/status agrega 24h/7d/30d/90d.
app.status.monitor.enabled=${STATUS_MONITOR_ENABLED:true}
app.status.health-url=${STATUS_HEALTH_URL:http://localhost:${server.port}/actuator/health}
app.status.monitor.fixed-rate-ms=${STATUS_MONITOR_FIXED_RATE_MS:60000}
app.status.monitor.initial-delay-ms=${STATUS_MONITOR_INITIAL_DELAY_MS:15000}
app.status.monitor.timeout-ms=${STATUS_MONITOR_TIMEOUT_MS:2500}

# springdoc OpenAPI. Auto-genera spec accesible en:
#   /v3/api-docs          → JSON spec
#   /v3/api-docs.yaml     → YAML spec
#   /swagger-ui.html      → Swagger UI interactivo
# Las tres rutas ya estaban permitidas en SecurityConfig desde el día 1
# por previsión, así que basta con añadir la dep al pom y configurar
# metadatos de la API aquí.
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
# Group default: solo expone endpoints bajo /api/**. Excluye actuator y
# rutas internas para que el doc público sea limpio.
springdoc.paths-to-match=/api/**

# Email vía Resend (HTTPS, no requiere SMTP outbound — funciona en Railway)
# Configurar en producción:
#   RESEND_API_KEY=re_xxxxxxxxxxxxxxxx (de https://resend.com/api-keys)
#   RESEND_FROM=onboarding@resend.dev (test sender, solo envía al email registrado)
#                  o un email de un dominio verificado en Resend
email.resend.api-key=${RESEND_API_KEY:}
email.resend.from=${RESEND_FROM:onboarding@resend.dev}

# URL base del frontend, usada por EmailVerificationService para construir
# el link del email. En dev local sobrescribir con FRONTEND_BASE_URL=http://localhost:5173.
app.frontend-base-url=${FRONTEND_BASE_URL:https://animeshowdown.dev}

# OAuth social login. El backend maneja el callback, emite la misma
# refresh cookie httpOnly que /api/auth/login y redirige
# al frontend /auth/callback para que hidrate el JWT vía /api/auth/refresh.
app.oauth.redirect-base=${APP_OAUTH_REDIRECT_BASE:${app.frontend-base-url}}

# Base URL del API expuesta hacia los proveedores OAuth. Tiene que coincidir
# byte a byte con lo whitelisteado en Google Cloud Console y Discord Developer
# Portal (sin trailing slash). En local pasar OAUTH_API_BASE=http://localhost:8080
# para que el flow funcione contra el backend de dev. Hardcodear los
# redirect-uri (en vez del placeholder {baseUrl}) evita depender de los
# X-Forwarded-* del proxy: Railway termina TLS y reenvía como http://, lo
# que hace que Spring construya redirect_uri=http://api.animeshowdown.dev/...
# y Google/Discord rechacen porque solo aceptan https://.
app.oauth.api-base=${OAUTH_API_BASE:https://api.animeshowdown.dev}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:CHANGE_ME_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:CHANGE_ME_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${app.oauth.api-base}/login/oauth2/code/google
spring.security.oauth2.client.registration.discord.client-id=${DISCORD_CLIENT_ID:CHANGE_ME_DISCORD_CLIENT_ID}
spring.security.oauth2.client.registration.discord.client-secret=${DISCORD_CLIENT_SECRET:CHANGE_ME_DISCORD_CLIENT_SECRET}
spring.security.oauth2.client.registration.discord.client-name=Discord
spring.security.oauth2.client.registration.discord.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.discord.redirect-uri=${app.oauth.api-base}/login/oauth2/code/discord
spring.security.oauth2.client.registration.discord.scope=identify,email
spring.security.oauth2.client.provider.discord.authorization-uri=https://discord.com/api/oauth2/authorize
spring.security.oauth2.client.provider.discord.token-uri=https://discord.com/api/oauth2/token
spring.security.oauth2.client.provider.discord.user-info-uri=https://discord.com/api/users/@me
spring.security.oauth2.client.provider.discord.user-name-attribute=id

# Vida del token de verificación de email. 24h cubre el caso "abro el
# correo al día siguiente". Si caduca, el usuario puede pedir reenvio
# desde el banner persistente.
app.email-verification.ttl-hours=${EMAIL_VERIFICATION_TTL_HOURS:24}

# Si true, los endpoints de voto rechazan con 403 a usuarios PENDIENTE.
# En prod true (estricto); los tests lo desactivan
# en application-test.properties para no obligar al fixture a simular
# el flujo completo de email.
app.email-verification.required-to-vote=${EMAIL_VERIFICATION_REQUIRED:true}

# Cron de torneos automáticos — POST /api/admin/torneos/auto-generar
# Lo dispara la GitHub Action .github/workflows/auto-tournament.yml cada 3 días.
# Cambiar a false para apagar en caliente sin redeploy de código.
app.tournament.auto.enabled=${TOURNAMENT_AUTO_ENABLED:true}

# PvP live: si no aparece rival rápido, abrimos una partida automáticamente
# para que la sección no se sienta vacía durante etapas de poco tráfico.
app.duelo-live.fallback-after-seconds=${DUEL_LIVE_FALLBACK_AFTER_SECONDS:3}
# Dificultad del bot PvP: el bot falla 1 de cada N rondas (2=falla 50%, facil; 3=falla 33%; 4=falla 25%, dificil).
app.duelo-live.bot-falla-cada=${DUEL_LIVE_BOT_FALLA_CADA:2}

# Alertas de favorito en movimiento: un scheduler diario notifica a quienes
# siguen un personaje cuando éste sube/baja >= umbral puestos en la ventana.
# enabled=false lo apaga en caliente sin redeploy. La idempotencia (una alerta
# por personaje/día/dirección) la garantiza el índice único de notificaciones.
app.alertas-favorito.enabled=${ALERTAS_FAVORITO_ENABLED:true}
app.alertas-favorito.cron=${ALERTAS_FAVORITO_CRON:0 0 9 * * *}
app.alertas-favorito.umbral-puestos=${ALERTAS_FAVORITO_UMBRAL:25}
app.alertas-favorito.ventana-dias=${ALERTAS_FAVORITO_VENTANA_DIAS:7}

# Recordatorio diario del cofre a quien no lo ha reclamado (18:00 UTC).
# max-fanout topa el nº de notificaciones por ejecución (pre-viral sobra).
app.alertas-cofre.enabled=${ALERTAS_COFRE_ENABLED:true}
app.alertas-cofre.cron=${ALERTAS_COFRE_CRON:0 0 18 * * *}
app.alertas-cofre.max-fanout=${ALERTAS_COFRE_MAX_FANOUT:5000}

# Ranking canónico: elo = elo_semilla(popularidad +15% femenino) + voto-peso·peso_votos.
# voto-peso bajo = la semilla manda y los votos ajustan; subirlo da más peso a los votos.
# Los params de la semilla (suelo/techo/factor/bonus) están en EloSemillaInitializeService.
app.ranking.voto-peso=${RANKING_VOTO_PESO:1.0}

# Secret compartido entre backend ↔ GitHub Action que llama
# POST /api/cron/torneos/auto-generar. El relaxed binding de Spring Boot
# debería convertir APP_CRON_SECRET → app.cron.secret automáticamente,
# pero al dejarlo explícito documentamos qué env var hay que setear en
# Railway y evitamos sorpresas si la convención cambia entre versiones.
# Vacío = el endpoint devuelve 401 a todas las llamadas (modo seguro).
# En producción definir con: openssl rand -hex 32
app.cron.secret=${APP_CRON_SECRET:}

# Secreto para derivar (SHA-256) la clave AES del token de ronda del ELO Duel.
# Vacío = clave efímera por instancia: los tokens en vuelo mueren en cada
# redeploy y no valen entre réplicas (auto-sana en el TTL de 10 min; NO es un
# fallo cripto). Definir para estabilizarlos: openssl rand -base64 48
app.elo-duel.token-secret=${ELO_DUEL_TOKEN_SECRET:}

# 2FA TOTP.
#   - app.totp.issuer: nombre que verá el usuario en su app authenticator
#     al añadir la cuenta ("AnimeShowdown:diego@...").
#   - app.totp.encryption-key: clave AES con la que se cifran los secrets
#     TOTP en BBDD. En producción inyectar TOTP_ENCRYPTION_KEY con un
#     valor largo aleatorio (openssl rand -base64 32). Si se filtra la
#     BBDD pero no el .env, los secrets son inservibles.
#   - app.totp.encryption-salt: 16 hex chars. NO es secreto, solo aleatoriza
#     la derivación PBKDF2 — se puede dejar fijo.
app.totp.issuer=${TOTP_ISSUER:AnimeShowdown}
app.totp.encryption-key=${TOTP_ENCRYPTION_KEY:CHANGE_ME_IN_PROD_openssl_rand_base64_32}
app.totp.encryption-salt=${TOTP_ENCRYPTION_SALT:5c0744940b5c369b}

# identidad anónima server-side.
# El voto invitado ahora se ata a una cookie firmada HMAC (httpOnly, no
# accesible desde JS) emitida por AnonymousIdentityService. Borrar
# localStorage o cambiar headers ya no resetea el cupo — la cookie
# persiste 30 días y solo el server-side puede firmar tokens válidos.
#
#   - hmac-key: clave secreta de 32+ bytes para HMAC-SHA256 del token
#     anónimo. En producción inyectar ANON_IDENTITY_HMAC_KEY con un
#     valor largo aleatorio (openssl rand -base64 32). Si se filtra, un
#     atacante puede falsificar tokens y saltarse el rate limit anónimo.
#   - cookie-name: nombre de la cookie. as_anon es genérico, sin marcar
#     identidad de la app a observadores.
#   - cookie-ttl-days: 30 días. Más largo = mejor antifraude pero mayor
#     exposición si el dispositivo se comparte.
app.anon-identity.hmac-key=${ANON_IDENTITY_HMAC_KEY:CHANGE_ME_IN_PROD_anon_identity_hmac_key_min_32_bytes}
app.anon-identity.cookie-name=${ANON_IDENTITY_COOKIE_NAME:as_anon}
app.anon-identity.cookie-ttl-days=${ANON_IDENTITY_COOKIE_TTL_DAYS:30}

# Cloudflare Turnstile como captcha
# bajo abuso. enabled=false en dev/test para no requerir secret real;
# enabled=true en prod activa la verificación server-side contra el
# endpoint de Cloudflare. Si enabled=true, ProductionSecretsValidator
# aborta el boot si secret está vacío o con placeholder CHANGE_ME.
#   - secret: server-side secret del widget Turnstile.
#   - endpoint: Cloudflare oficial. Configurable solo para tests con WireMock.
app.turnstile.enabled=${TURNSTILE_ENABLED:false}
app.turnstile.secret=${TURNSTILE_SECRET:}
app.turnstile.endpoint=${TURNSTILE_ENDPOINT:https://challenges.cloudflare.com/turnstile/v0/siteverify}
# Sitekey PÚBLICO del widget Turnstile. Se expone al frontend en la
# respuesta 428 cuando se requiere captcha — no es secreto. En dev
# vacío para que el frontend muestre un "captcha disabled".
app.turnstile.sitekey=${TURNSTILE_SITEKEY:}

# umbrales antifraude para voto
# anónimo. Aplicados sobre el MÁXIMO entre conteo por anon_session_id y
# por anon_ip_hash en la ventana. Soft = captcha permite continuar;
# hard = captcha obligatorio; block-24h = ni captcha, espera 24h.
# Configurables por env var sin redeploy para tunearlos según telemetría.
app.anon-abuse.soft-per-hour=${ANON_ABUSE_SOFT_PER_HOUR:10}
app.anon-abuse.hard-per-hour=${ANON_ABUSE_HARD_PER_HOUR:30}
app.anon-abuse.block-per-24h=${ANON_ABUSE_BLOCK_PER_24H:100}

# CORS — orígenes permitidos separados por coma. Antes vivían hardcoded en
# SecurityConfig.java; ahora se externalizan para poder cambiar dominios sin
# redeploy. En prod inyectar CORS_ALLOWED_ORIGINS con la lista real.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://localhost:4173,http://127.0.0.1:4173,https://animeshowdown.pages.dev,https://animeshowdown.dev,https://www.animeshowdown.dev}
cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:https://*.animeshowdown.pages.dev}

# Caché Caffeine: la configuración por cache (jikan-top-characters 1h,
# og-personaje/og-torneo 7d) vive en CacheConfig.java porque cada cache
# necesita TTL distinto y el property spring.cache.caffeine.spec es
# global. Solo dejamos el type aquí; las caches se definen como beans.
spring.cache.type=caffeine

# Comentarios de fichas: moderación básica + rate limit por usuario.
app.comentarios.rate-limit-per-hour=${COMENTARIOS_RATE_LIMIT_PER_HOUR:5}
app.comentarios.profanity-stems=${COMENTARIOS_PROFANITY_STEMS:puta,puto,mierd,joder,cabron,imbecil,pendej,cojon,fuck,shit,bitch,asshole,bastard,cunt,dick}

# Sugerencias de personaje: rate limit por usuario/hora (cola moderada por admin).
app.sugerencias.rate-limit-per-hour=${SUGERENCIAS_RATE_LIMIT_PER_HOUR:3}

# URL base donde el backend descarga las imágenes de personajes para
# componer las OG images server-side. En dev se puede apuntar a
# http://localhost:5173 via env var IMAGES_BASE_URL.
app.images.base-url=${IMAGES_BASE_URL:https://animeshowdown.dev}

# URL base de la API de Jikan. Externalizada (antes hardcodeada en
# JikanService) para poder apuntar a un mock/WireMock en tests o a un
# entorno alternativo sin recompilar.
app.jikan.base-url=${JIKAN_BASE_URL:https://api.jikan.moe/v4}

# Resilience4j para JikanService: retry con backoff exponencial, circuit
# breaker que se abre tras 50% de fallos en 10 llamadas, y timeout duro de
# 5s por request a Jikan (jikan suele ir bien <500ms; 5s es generoso).
resilience4j.retry.instances.jikan.max-attempts=3
resilience4j.retry.instances.jikan.wait-duration=500ms
resilience4j.retry.instances.jikan.exponential-backoff-multiplier=2
resilience4j.retry.instances.jikan.retry-exceptions=org.springframework.web.client.ResourceAccessException,org.springframework.web.client.HttpServerErrorException,java.io.IOException
resilience4j.circuitbreaker.instances.jikan.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.jikan.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.jikan.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.jikan.permitted-number-of-calls-in-half-open-state=3
resilience4j.timelimiter.instances.jikan.timeout-duration=5s

# ───────────────────────────────────────────────────────────────────────────
# Cartas coleccionables (Fase 1) — economía de moneda blanda.
# Anti-casino: la moneda se gana JUGANDO, jamás con dinero real. Valores
# tuneables sin recompilar. El tope diario es amplio a propósito (anti-farmeo
# suave): la acción de juego siempre funciona; pasado el tope sólo no dropea.
# ───────────────────────────────────────────────────────────────────────────
app.cartas.sobre.precio=${CARTAS_SOBRE_PRECIO:100}
# Probabilidad de carta ESPECIAL al abrir un sobre + pity duro (garantía de
# especial tras N sobres secos). Subidos (5%→20%, pity 10→7) para una economía
# de cartas más generosa sin colapsar la rareza.
app.cartas.especial.probabilidad-base=${CARTAS_ESPECIAL_PROB:0.25}
app.cartas.especial.pity-duro=${CARTAS_ESPECIAL_PITY:7}
app.cartas.drop.voto=${CARTAS_DROP_VOTO:10}
app.cartas.drop.voto-cada-n=${CARTAS_DROP_VOTO_CADA_N:10}
app.cartas.drop.mision-diaria=${CARTAS_DROP_MISION_DIARIA:30}
app.cartas.drop.torneo=${CARTAS_DROP_TORNEO:40}
app.cartas.drop.duelo=${CARTAS_DROP_DUELO:35}
app.cartas.drop.tope-diario=${CARTAS_DROP_TOPE_DIARIO:120}
