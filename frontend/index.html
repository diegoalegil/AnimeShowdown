<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- PWA iconos: Android/Chrome usan icon-192/512 del manifest.webmanifest;
         iOS requiere apple-touch-icon explícito (180x180) porque ignora el
         manifest. Los meta apple-mobile-web-app-* controlan la UX al añadir
         a la pantalla de inicio en iOS. Plan v2 §3.2. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AnimeShowdown" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d0d12" />
    <meta name="description" content="Vota a tus personajes de anime favoritos en torneos cara a cara con sistema ELO en directo y bracket visuales." />
    <meta property="og:title" content="AnimeShowdown — Torneos de personajes de anime" />
    <meta property="og:description" content="125 personajes, brackets visuales, ranking ELO en directo. Vota a tu favorito y corona al campeón." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo.webp" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&family=Noto+Sans+JP:wght@500;700&display=swap&subset=japanese"
      rel="stylesheet"
    />
    <!-- Plan v2 §5.8: preload del LCP candidate (logo del Hero de la home).
         Sin esto, el logo se descarga tras el JS y aparece >2.5s, que es el
         umbral CWV "Good". Con preload se baja a ~1s en 4G simulado.
         fetchpriority=high reordena el cabezal de descarga para que vaya
         antes que las fuentes y otros assets no críticos. -->
    <link rel="preload" as="image" href="/logo.webp" type="image/webp" fetchpriority="high" />
    <title>AnimeShowdown — Torneos de personajes de anime</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
